<div style="max-width: 600px; margin: 2rem auto; padding: 1rem; font-family: sans-serif;">
     <h1>Ission Agent</h1>

     <div>
          <input type="text" [(ngModel)]="issueUrl" placeholder="Cole a URL da issue aqui"
               style="width: 100%; padding: 0.5rem; font-size: 1rem; box-sizing: border-box;" />
     </div>

     <div style="margin-top: 1rem;">
          <button (click)="onAnalyze()" [disabled]="isLoading"
               style="padding: 0.5rem 1.5rem; font-size: 1rem; cursor: pointer;">
               {{ isLoading ? 'Pensando...' : 'Analisar' }}
          </button>
     </div>

     <section *ngIf="apiResponse" style="margin-top: 2rem;">
          <h2>Pensamentos do Agente</h2>
          <ul>
               <li *ngFor="let thought of apiResponse.thoughts">{{ thought }}</li>
          </ul>

          <h2>Comentário Final</h2>
          <p>{{ apiResponse.finalComment }}</p>
     </section>
</div>
